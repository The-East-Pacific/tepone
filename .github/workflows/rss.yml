name: Update Forum RSS Feed

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/rss.yml'
      - 'scripts/fetch-rss.js'

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch RSS and write JSON
        run: node scripts/fetch-rss.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update forum RSS feed'
          file_pattern: 'public/data/latest-topics.json'
